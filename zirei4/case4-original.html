:#59462c;font-size:14px;line-height:1.65;margin-bottom:10px;white-space:pre-wrap}.explain{margin:0;padding-left:22px;display:grid;gap:8px}.explain li{font-size:13px;line-height:1.55}.judge{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}.judge button{border-radius:8px;padding:11px}.judge .ok.active{background:var(--green);border-color:var(--green);color:#fff}.judge .bad.active{background:var(--red);border-color:var(--red);color:#fff}.judge .clear.active{background:#4d4842;border-color:#4d4842;color:#fff}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.actions button,.wide{border-radius:8px;padding:11px}.wide{width:100%;margin-top:4px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{border:1px solid var(--line);border-radius:8px;background:#fff;padding:10px}.stat strong{display:block;font-size:24px;line-height:1}.stat span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.export textarea{width:100%;min-height:140px;border:1px solid var(--line);border-radius:8px;padding:10px;font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#2c2925;background:#fff;resize:vertical}.export-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.note{color:var(--muted);font-size:12px;line-height:1.55;margin:0}.toast{display:none;margin-top:8px;padding:9px 10px;border-radius:8px;background:var(--soft);color:var(--green);font-size:12px;font-weight:800}.toast.show{display:block}@media(max-width:380px){.screen{padding:10px}h1{font-size:24px}.actions,.export-row,.judge{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}

  <script id="cards-data" type="application/json">[{"id":"ea-01","topic":"経営分析","title":"経営分析 1: 在庫が重い会社","difficulty":"★","time":"8分","problem":"D社と同業他社の指標は以下の通りである。D社の課題指標を1つ選び、理由を30字程度で述べよ。D社: 流動比率190%、当座比率72%、棚卸資産回転率4.0回、売上高営業利益率8%。同業他社: 流動比率180%、当座比率150%、棚卸資産回転率9.0回、売上高営業利益率7%。","answer":"課題指標は棚卸資産回転率、または当座比率。理由は、在庫が過大で資金が棚卸資産に固定化し、短期安全性を低下させているため。","explanation":["流動比率だけ見ると悪くないが、当座比率が大きく低い。","棚卸資産回転率が同業より低く、在庫滞留が読み取れる。","安全性の問題を在庫という財務要因に結びつける。"]},{"id":"ea-02","topic":"経営分析","title":"経営分析 2: 粗利は高いのに営業利益が低い","difficulty":"★","time":"8分","problem":"D社の売上高総利益率は48%、売上高営業利益率は3%。同業他社は売上高総利益率35%、売上高営業利益率8%である。D社の課題を示す指標を1つ選び、理由を述べよ。","answer":"課題指標は売上高営業利益率。D社は高い粗利を獲得しているが、販管費負担が大きく営業利益率が低いため。","explanation":["総利益率は優れているので、商品の付加価値は高い。","営業利益率で逆転しているため、販管費の多さを疑う。","収益性は利益の段階を分けて見る。"]},{"id":"ea-03","topic":"経営分析","title":"経営分析 3: 設備が重い会社","difficulty":"★★","time":"10分","problem":"D社の有形固定資産回転率は3.0回、同業他社は8.0回である。一方、売上高総利益率はD社42%、同業他社38%である。D社の課題と強みを1つずつ答えよ。","answer":"課題は有形固定資産回転率が低く設備効率が悪い点。強みは売上高総利益率が高く、製品・サービスの付加価値が高い点。","explanation":["効率性は資産が売上を生んでいるかを見る。","収益性は粗利段階で強みを見られる。","課題と強みを同じ分類から無理に選ぶ必要はない。"]},{"id":"ea-04","topic":"経営分析","title":"経営分析 4: 自己資本比率の読み取り","difficulty":"★","time":"8分","problem":"D社の自己資本比率は18%、同業他社は45%である。流動比率はD社170%、同業他社160%である。D社の財政状態の課題を述べよ。","answer":"自己資本比率が低く借入依存度が高いため、長期安全性が低い。流動比率は悪くないため、短期より長期の安全性が課題である。","explanation":["流動比率は短期安全性、自己資本比率は長期安全性。","短期安全性が悪くない場合でも、財務体質が弱いことはある。","設問で財政状態を聞かれたら安全性指標を優先する。"]},{"id":"ea-05","topic":"経営分析","title":"経営分析 5: 生産性指標","difficulty":"★★","time":"10分","problem":"D社の付加価値額は1,200百万円、従業員数は120人。同業他社の付加価値額は1,500百万円、従業員数は100人である。労働生産性を比較し、D社の課題を述べよ。","answer":"D社の労働生産性は10百万円/人、同業他社は15百万円/人。D社は従業員1人当たりの付加価値創出力が低い。","explanation":["労働生産性 = 付加価値額 ÷ 従業員数。","売上ではなく付加価値で見る問題。","生産性指定があるときは人数・付加価値の情報を探す。"]},{"id":"ea-06","topic":"経営分析","title":"経営分析 6: 前期比較","difficulty":"★★","time":"10分","problem":"D社の前期売上高営業利益率は9%、当期は5%である。売上高総利益率は前期38%、当期37%でほぼ同水準。販管費率は前期29%、当期32%である。悪化要因を述べよ。","answer":"売上高総利益率はほぼ横ばいであるため、営業利益率悪化の主因は販管費率の上昇である。","explanation":["前期比較では変化した項目を見る。","粗利率がほぼ同じなら、売上原価ではなく販管費が主因。","将来予想や外部環境を混ぜず、期間内の変化で答える。"]},{"id":"ea-07","topic":"経営分析","title":"経営分析 7: 指標選択の重複回避","difficulty":"★★","time":"10分","problem":"D社は売上高総利益率20%、売上高営業利益率2%、売上高経常利益率1%。同業他社はそれぞれ35%、8%、7%。課題指標を2つ選ぶなら何を避けるべきか。","answer":"営業利益率と経常利益率を両方選んで同じ原因を重複させることは避ける。総利益率と営業利益率など、利益段階の違いが説明できる組合せを選ぶ。","explanation":["似た意味の指標を並べると記述原因が重複する。","総利益率は売上原価、営業利益率は販管費まで含む。","指標選択は記述で原因を書けるかまで考える。"]},{"id":"ea-08","topic":"経営分析","title":"経営分析 8: 課題2つ強み1つ","difficulty":"★★","time":"12分","problem":"D社は当座比率80%、自己資本比率20%、売上高総利益率45%。同業他社は当座比率140%、自己資本比率40%、売上高総利益率32%。課題2つ、強み1つを選べ。","answer":"課題は当座比率と自己資本比率。強みは売上高総利益率。D社は短期・長期安全性に課題がある一方、付加価値の高い販売ができている。","explanation":["課題2つは安全性から短期・長期で分けられる。","強みは収益性の源流である総利益率を使う。","指定個数に合わせて分類バランスを取る。"]},{"id":"cvp-01","topic":"CVP","title":"CVP 1: 基本BEP","difficulty":"★","time":"6分","problem":"D社の販売単価は1,000円、単位当たり変動費は600円、月間固定費は800,000円である。損益分岐点販売数量を求めよ。","answer":"2,000個。単位当たり限界利益は1,000-600=400円。800,000÷400=2,000個。","explanation":["BEP数量 = 固定費 ÷ 単位当たり限界利益。","まず単価と変動費から限界利益を出す。","固定費を限界利益で回収する数量を求める。"]},{"id":"cvp-02","topic":"CVP","title":"CVP 2: 目標利益","difficulty":"★","time":"7分","problem":"販売単価2,000円、変動費率60%、固定費1,200,000円。目標利益400,000円を達成する売上高を求めよ。","answer":"4,000,000円。限界利益率は40%。必要限界利益は1,200,000+400,000=1,600,000円。1,600,000÷0.4=4,000,000円。","explanation":["売上高を求めるときは限界利益率を使う。","必要限界利益 = 固定費 + 目標利益。","変動費率60%なら限界利益率40%。"]},{"id":"cvp-03","topic":"CVP","title":"CVP 3: 安全余裕率","difficulty":"★","time":"6分","problem":"実際売上高は5,000,000円、損益分岐点売上高は3,500,000円である。安全余裕率を求めよ。","answer":"30%。安全余裕率=(5,000,000-3,500,000)÷5,000,000=30%。","explanation":["安全余裕率は実際売上高に対する余裕。","損益分岐点比率は3,500,000÷5,000,000=70%。","安全余裕率 = 1 - 損益分岐点比率。"]},{"id":"cvp-04","topic":"CVP","title":"CVP 4: 固定費削減の効果","difficulty":"★★","time":"8分","problem":"現在の固定費は1,000,000円、限界利益率は25%。固定費を200,000円削減した場合、損益分岐点売上高はいくら下がるか。","answer":"800,000円下がる。固定費削減額200,000÷限界利益率0.25=800,000円。","explanation":["BEP売上高 = 固定費 ÷ 限界利益率。","固定費が減ると、その分だけ必要売上も下がる。","限界利益率が低いほど固定費削減の売上換算効果は大きい。"]},{"id":"cvp-05","topic":"CVP","title":"CVP 5: 製品ミックス","difficulty":"★★★","time":"12分","problem":"製品Aの単位当たり限界利益は300円、製品Bは500円。作業時間はAが1時間、Bが2時間。利用可能時間は100時間。需要上限はA80個、B40個。利益最大化の考え方を述べよ。","answer":"時間当たり限界利益はAが300円/時、Bが250円/時。まずAを需要上限80個まで作り、残り20時間でBを10個作る。","explanation":["制約が作業時間なら、時間当たり限界利益を見る。","単位当たり限界利益だけでBを優先しない。","需要上限と能力制約の両方を確認する。"]},{"id":"cvp-06","topic":"CVP","title":"CVP 6: セグメント別BEP","difficulty":"★★","time":"10分","problem":"A事業の売上高は3,000千円、変動費率70%。B事業の売上高は2,000千円、変動費率40%。全社固定費は1,400千円。全社の営業利益を求めよ。","answer":"700千円。A限界利益900千円、B限界利益1,200千円、合計2,100千円。2,100-1,400=700千円。","explanation":["セグメント別に限界利益を出して合算する。","変動費率が違うため、売上合計に平均変動費率を雑に当てない。","固定費を最後に差し引く。"]},{"id":"cvp-07","topic":"CVP","title":"CVP 7: 段階的変動費率","difficulty":"★★★","time":"12分","problem":"売上高が3,000千円までは変動費率60%、3,000千円を超える部分は仕入割引により変動費率50%。固定費は1,200千円。売上高4,000千円の営業利益を求めよ。","answer":"500千円。限界利益は3,000×40%=1,200、超過1,000×50%=500、合計1,700。営業利益=1,700-1,200=500千円。","explanation":["段階的変動費率は売上を区切って計算する。","全売上に50%や60%を一律適用しない。","固定費を最後に引く。"]},{"id":"cvp-08","topic":"CVP","title":"CVP 8: 価格変更","difficulty":"★★","time":"10分","problem":"現状は販売単価1,000円、変動費600円、販売数量5,000個、固定費1,500,000円。単価を900円に下げると販売数量が6,500個になる。営業利益は増えるか。","answer":"現状利益は(1,000-600)×5,000-1,500,000=500,000円。変更後は(900-600)×6,500-1,500,000=450,000円。利益は50,000円減る。","explanation":["値下げは数量増だけで判断しない。","単位限界利益の低下と数量増加を同時に見る。","固定費は差額比較では同じなので、限界利益総額の比較でもよい。"]},{"id":"cvp-09","topic":"CVP","title":"CVP 9: 固定費増加と数量増","difficulty":"★★","time":"10分","problem":"広告を行うと固定費が300,000円増えるが、販売数量が1,000個増える。単位当たり限界利益は250円。広告を行うべきか。","answer":"行うべきでない。増加限界利益は250×1,000=250,000円で、固定費増加300,000円を下回るため利益は50,000円減少する。","explanation":["意思決定では増分限界利益と増分固定費を比較する。","売上増ではなく限界利益増を見る。","固定費増を回収できる数量か確認する。"]},{"id":"cvp-10","topic":"CVP","title":"CVP 10: 必要販売数量","difficulty":"★★","time":"8分","problem":"単価1,500円、変動費900円、固定費1,800,000円。営業利益600,000円を得るには何個販売する必要があるか。","answer":"4,000個。単位限界利益600円。必要限界利益は2,400,000円。2,400,000÷600=4,000個。","explanation":["数量なら単位限界利益で割る。","必要限界利益 = 固定費 + 目標利益。","単価と変動費の差を先に出す。"]},{"id":"npv-01","topic":"NPV","title":"NPV 1: 基本投資判断","difficulty":"★★","time":"10分","problem":"投資額1,000万円。毎年の営業CFは300万円で5年間発生する。割引率10%、5年の年金現価係数は3.79。NPVを求め、投資可否を判断せよ。","answer":"現在価値は300×3.79=1,137万円。NPV=1,137-1,000=137万円。正なので投資可。","explanation":["毎年同額CFは年金現価係数を使う。","NPV = 将来CFの現在価値 - 初期投資。","正なら投資案は定量的に採用可能。"]},{"id":"npv-02","topic":"NPV","title":"NPV 2: 減価償却の税効果","difficulty":"★★★","time":"12分","problem":"設備投資500万円、耐用年数5年、残存価額ゼロ、定額法。投資により毎年の売上増加200万円、現金支出増加80万円。税率30%。年間営業CFを求めよ。","answer":"減価償却費は100万円。増分営業利益は200-80-100=20万円。営業CF=20×(1-0.3)+100=114万円。","explanation":["営業CFは税引後利益に減価償却費を戻す。","減価償却費は現金支出ではないが節税効果を持つ。","売上増と現金支出増だけでCFを作らない。"]},{"id":"npv-03","topic":"NPV","title":"NPV 3: 運転資本","difficulty":"★★★","time":"12分","problem":"投資開始時に在庫増加として運転資本100万円が必要。5年後に全額回収される。割引率10%、5年の複利現価係数は0.621。運転資本がNPVに与える影響を求めよ。","answer":"開始時に-100万円、5年後回収の現在価値は100×0.621=62.1万円。NPVへの影響は-37.9万円。","explanation":["運転資本は開始時に資金拘束される。","終了時に回収されれば将来CFとして戻る。","回収額は割り引くため、現在価値ではマイナス影響が残る。"]},{"id":"npv-04","topic":"NPV","title":"NPV 4: 残存価額と税金","difficulty":"★★★","time":"12分","problem":"設備の期末簿価は200万円、売却価格は260万円、税率30%。売却時の税引後CFを求めよ。","answer":"売却益は60万円、税金は18万円。税引後売却CFは260-18=242万円。","explanation":["売却価格そのものがCFになる。","簿価との差額に税金または節税が発生する。","売却益なら税金を差し引く。"]},{"id":"npv-05","topic":"NPV","title":"NPV 5: 簿価未満売却","difficulty":"★★★","time":"12分","problem":"設備の期末簿価は300万円、売却価格は180万円、税率30%。売却時の税引後CFを求めよ。","answer":"売却損は120万円で節税額は36万円。税引後売却CFは180+36=216万円。","explanation":["簿価より安く売ると売却損が出る。","黒字企業なら売却損により節税効果が生じる。","売却価格に節税額を加える。"]},{"id":"npv-06","topic":"NPV","title":"NPV 6: 回収期間","difficulty":"★★","time":"8分","problem":"初期投資1,200万円、毎年の営業CFは350万円。単純回収期間を求めよ。","answer":"1,200÷350=3.43年。","explanation":["単純回収期間は割引を考慮しない。","投資額を毎年CFで割る。","NPVとは評価軸が違い、資金回収の早さを見る。"]},{"id":"npv-07","topic":"NPV","title":"NPV 7: 差額CF","difficulty":"★★★","time":"12分","problem":"旧設備を継続すると年間現金支出は500万円。新設備に替えると年間現金支出は320万円。新設備投資額は600万円、期間は4年。税金は無視する。差額CFで考えると毎年いくらの効果か。","answer":"毎年180万円の現金支出削減効果。旧設備と新設備の差額500-320=180万円をCIFとして扱う。","explanation":["複数案比較は差額で見ると簡単。","売上が同じなら支出削減が増分CF。","新設備投資額は初期COFとして別枠。"]},{"id":"npv-08","topic":"NPV","title":"NPV 8: 永続価値","difficulty":"★★★★","time":"12分","problem":"5年後から毎年120万円のCFが永続的に発生する見込みである。割引率は6%。5年後時点の永続価値を求めよ。","answer":"2,000万円。永続価値=120÷0.06=2,000万円。これをさらに現在価値に直すなら5年後の複利現価係数を掛ける。","explanation":["永続価値は毎年CF÷割引率。","求めた価値は永続CF発生直前の時点の価値。","NPVではさらに現在時点まで割り引くことが多い。"]},{"id":"npv-09","topic":"NPV","title":"NPV 9: 期待値","difficulty":"★★★★","time":"12分","problem":"新製品の1年後CFは、成功時600万円、失敗時100万円。成功確率40%、失敗確率60%。割引率10%。期待CFの現在価値を求めよ。","answer":"期待CFは600×0.4+100×0.6=300万円。現在価値は300÷1.1=272.7万円。","explanation":["シナリオ分岐は確率で加重平均する。","期待CFを出してから割り引く。","成功ケースだけ見て判断しない。"]},{"id":"npv-10","topic":"NPV","title":"NPV 10: 投資時点のズレ","difficulty":"★★★★","time":"12分","problem":"設備投資は2年目期首に500万円発生し、その後3年間、各年末に220万円のCFが発生する。現在を基準にNPVを求める場合、何に注意すべきか。","answer":"投資額も現在価値に割り引く必要がある。2年目期首は1年後時点なので、500万円を1年分割り引く。CFも発生時点に応じて割り引く。","explanation":["投資が現在時点でない場合、初期投資も割引対象になる。","期首と期末のズレを線表で整理する。","「投資時点基準」か「現在時点基準」かを読む。"]},{"id":"oda-01","topic":"ODA","title":"ODA 1: 内製か外注か","difficulty":"★★","time":"10分","problem":"部品Xを内製すると材料費300円、直接労務費200円、変動間接費100円が発生する。固定費150円は外注しても発生する。外注単価は650円。内製か外注か。","answer":"内製すべき。内製の意思決定関連原価は300+200+100=600円。固定費150円は埋没原価。外注650円より安い。","explanation":["どちらでも発生する固定費は埋没原価。","意思決定では差が出る費用だけを見る。","内製関連原価と外注価格を比較する。"]},{"id":"oda-02","topic":"ODA","title":"ODA 2: 機会原価","difficulty":"★★★","time":"12分","problem":"内製関連原価は600円、外注単価は650円。ただし外注すると空いた設備で1個当たり100円の利益を得る別製品を作れる。外注すべきか。","answer":"外注すべき。内製すると別製品利益100円を失うため、内製の機会原価込み原価は700円。外注650円の方が有利。","explanation":["外注で空く能力に価値があれば機会原価を考える。","内製の見かけ原価だけで判断しない。","機会原価は見えないが意思決定に必要。"]},{"id":"oda-03","topic":"ODA","title":"ODA 3: 事業撤退判断","difficulty":"★★","time":"10分","problem":"店舗Aの売上高1,000万円、変動費600万円、個別固定費250万円、共通固定費配賦額200万円。営業利益は赤字である。撤退すべきか。","answer":"撤退すべきでない可能性が高い。限界利益400万円から個別固定費250万円を引いた貢献利益は150万円でプラス。共通固定費回収に貢献している。","explanation":["撤退判断では共通固定費配賦後の営業利益だけで見ない。","貢献利益がプラスなら撤退で全社利益が悪化することがある。","個別固定費と共通固定費を分ける。"]},{"id":"oda-04","topic":"ODA","title":"ODA 4: 特別注文","difficulty":"★★","time":"10分","problem":"通常単価1,000円、変動費700円。余剰能力があり、既存販売に影響しない特別注文を単価800円で100個受けられる。受注すべきか。","answer":"受注すべき。単位限界利益は800-700=100円でプラス。余剰能力があり既存販売に影響しないため、利益が10,000円増える。","explanation":["特別注文は通常価格より安くても限界利益がプラスなら検討できる。","余剰能力と既存顧客への影響が前提。","固定費が増えないなら限界利益増が利益増になる。"]},{"id":"oda-05","topic":"ODA","title":"ODA 5: 追加加工","difficulty":"★★★","time":"12分","problem":"半製品Sはそのまま売ると1個1,200円で売れる。追加加工費300円をかけると製品Tとして1,600円で売れる。追加固定費は50,000円、数量は400個。追加加工すべきか。","answer":"追加加工すべきでない。追加収入は400円×400個=160,000円。追加費用は加工費120,000円+追加固定費50,000円=170,000円で、差額は-10,000円。","explanation":["追加加工判断は差額収入と差額費用を比較する。","埋没している半製品原価は考えない。","追加固定費を忘れない。"]},{"id":"desc-01","topic":"記述問題","title":"記述 1: 在庫リスク","difficulty":"★★","time":"8分","problem":"新規に仕入販売事業を始める場合の財務的リスクと対策を40字程度で述べよ。","answer":"在庫滞留による資金繰り悪化リスクがあるため、需要予測と在庫回転管理を徹底する。","explanation":["財務的リスクなのでノウハウ不足だけを書かない。","仕入販売なら在庫と運転資本が重要。","リスクと対策をセットで書く。"]},{"id":"desc-02","topic":"記述問題","title":"記述 2: 為替リスク","difficulty":"★★","time":"8分","problem":"輸入販売を行うD社が注意すべき財務的リスクと対策を40字程度で述べよ。","answer":"為替変動により仕入原価が上昇するリスクがあるため、為替予約等で変動を抑制する。","explanation":["輸入なら為替リスクを想起する。","財務的リスクは収益や資金繰りへの影響で書く。","対策は為替予約、通貨オプション、価格転嫁など。"]},{"id":"desc-03","topic":"記述問題","title":"記述 3: ROI評価","difficulty":"★★★","time":"10分","problem":"事業部長をROIだけで評価する場合の問題点を40字程度で述べよ。","answer":"ROI低下を避けるため、全社利益を高める投資まで見送る部分最適を招く。","explanation":["ROIは率の指標なので、利益額が増えても率が下がることがある。","評価制度は行動を誘導する。","全社最適と事業部最適のズレを書く。"]},{"id":"desc-04","topic":"記述問題","title":"記述 4: 負ののれん","difficulty":"★★★","time":"10分","problem":"純資産額より低い価格で企業を買収できる場合、留意すべき点を述べよ。","answer":"簿外債務や訴訟等の問題を抱える可能性があるため、DDで実態を確認する。","explanation":["安く買える理由を疑う。","負ののれんは特別利益だけでなく買収リスクとセット。","DD、簿外債務、シナジーを思い出す。"]},{"id":"desc-05","topic":"記述問題","title":"記述 5: 設備投資の資金繰り","difficulty":"★★","time":"8分","problem":"大型設備投資を行う際の財務上の留意点を40字程度で述べよ。","answer":"初期投資により資金繰りと安全性が悪化するため、投資回収期間と資金調達を確認する。","explanation":["設備投資は収益性だけでなく安全性にも影響する。","投資回収期間、借入増加、固定費増加を見る。","財務上の留意点なので資金繰りを入れる。"]},{"id":"roi-01","topic":"ROI","title":"ROI 1: 基本計算","difficulty":"★★","time":"8分","problem":"事業部の営業利益は120百万円、投下資本は2,400百万円である。ROIを求めよ。","answer":"5%。120÷2,400=0.05。","explanation":["ROI = 利益 ÷ 投下資本。","百分率で答える。","分子が営業利益かどうかは設問指定を確認する。"]},{"id":"roi-02","topic":"ROI","title":"ROI 2: 投資後の評価","difficulty":"★★★","time":"12分","problem":"現事業部ROIは10%。新投資は投下資本1,000万円、営業利益80万円を増やす。全社資本コストは6%。事業部長が投資を避ける理由と会社としての判断を述べよ。","answer":"新投資単体ROIは8%で事業部ROIを下げる可能性があるため事業部長は避ける。しかし資本コスト6%を上回るため会社全体では採用余地がある。","explanation":["ROI評価は部分最適を招く。","事業部ROIより低い投資でも、資本コストを上回れば企業価値に貢献する。","率だけでなく利益額と資本コストを見る。"]}]</script>
  <script>
    const cards = JSON.parse(document.getElementById('cards-data').textContent);
    const topics = ['全部','未','×復習','〇済','経営分析','CVP','NPV','ODA','記述問題','ROI'];
    const storageKey = 'case4-original-progress-v1';
    let progress = loadProgress();
    let topic = '全部';
    let filtered = cards.slice();
    let index = 0;
    let answerOpen = false;
    function loadProgress(){try{return JSON.parse(localStorage.getItem(storageKey) || '{}')}catch(e){return {}}}
    function saveProgress(){try{localStorage.setItem(storageKey, JSON.stringify(progress))}catch(e){}}
    function esc(value){return String(value == null ? '' : value).replace(/[&<>"']/g,function(s){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]})}
    function statusOf(id){return progress[id] && progress[id].status ? progress[id].status : 'unseen'}
    function statusLabel(s){return s === 'ok' ? '〇分かる' : s === 'bad' ? '×分からない' : '未'}
    function currentCards(){if(topic==='全部')return cards.slice();if(topic==='未')return cards.filter(c=>statusOf(c.id)==='unseen');if(topic==='×復習')return cards.filter(c=>statusOf(c.id)==='bad');if(topic==='〇済')return cards.filter(c=>statusOf(c.id)==='ok');return cards.filter(c=>c.topic===topic)}
    function renderStats(){const ok=cards.filter(c=>statusOf(c.id)==='ok').length;const bad=cards.filter(c=>statusOf(c.id)==='bad').length;const unseen=cards.length-ok-bad;document.getElementById('stats').innerHTML='<div class="stat"><strong>'+ok+'</strong><span>〇分かる</span></div><div class="stat"><strong>'+bad+'</strong><span>×復習</span></div><div class="stat"><strong>'+unseen+'</strong><span>未</span></div>'}
    function renderFilters(){document.getElementById('filters').innerHTML=topics.map(t=>'<button class="'+(t===topic?'active':'')+'" data-topic="'+esc(t)+'">'+esc(t)+'</button>').join('')}
    function renderExport(){const ok=cards.filter(c=>statusOf(c.id)==='ok');const bad=cards.filter(c=>statusOf(c.id)==='bad');const unseen=cards.length-ok.length-bad.length;const lines=[];lines.push('事例IVオリジナル問題記録 '+new Date().toLocaleString('ja-JP'));lines.push('合計:'+cards.length+' 〇分かる:'+ok.length+' ×分からない:'+bad.length+' 未:'+unseen);lines.push('');lines.push('【×復習】');if(!bad.length)lines.push('なし');bad.forEach((c,i)=>lines.push((i+1)+'. ['+c.topic+'/'+c.difficulty+'] '+c.title));lines.push('');lines.push('【〇分かる】');if(!ok.length)lines.push('なし');ok.forEach((c,i)=>lines.push((i+1)+'. ['+c.topic+'] '+c.title));document.getElementById('exportText').value=lines.join('\n')}
    function render(){renderStats();renderExport();const c=filtered[index];document.getElementById('sourceText').textContent=cards.length+' questions';document.getElementById('positionText').textContent=filtered.length?(index+1)+' / '+filtered.length:'0 / 0';if(!c){document.getElementById('card').innerHTML='<p class="note">カードがありません。</p>';return}const s=statusOf(c.id);const meta=[c.topic,c.difficulty,c.time,statusLabel(s)].filter(Boolean);const chips=meta.map(m=>'<span class="chip'+(m.indexOf('×')===0?' bad':m.indexOf('〇')===0?' ok':'')+'">'+esc(m)+'</span>').join('');const explanation=c.explanation.map(x=>'<li>'+esc(x)+'</li>').join('');document.getElementById('card').innerHTML='<div class="meta">'+chips+'</div><h2>'+esc(c.title)+'</h2><p class="caption">問題</p><div class="problem">'+esc(c.problem)+'</div><p class="caption">自己判定</p><div class="judge"><button class="ok '+(s==='ok'?'active':'')+'" data-judge="ok">〇分かる</button><button class="bad '+(s==='bad'?'active':'')+'" data-judge="bad">×分からない</button><button class="clear '+(s==='unseen'?'active':'')+'" data-judge="unseen">未に戻す</button></div><button class="wide" id="toggleAnswer">'+(answerOpen?'解説を隠す':'解説を見る')+'</button><div class="answer '+(answerOpen?'show':'')+'"><p class="caption">解答</p><div class="answer-main">'+esc(c.answer)+'</div><p class="caption">解説</p><ol class="explain">'+explanation+'</ol></div>';document.querySelectorAll('[data-judge]').forEach(btn=>btn.addEventListener('click',()=>setJudge(c.id,btn.dataset.judge)));document.getElementById('toggleAnswer').addEventListener('click',()=>{answerOpen=!answerOpen;render()})}
    function setJudge(id,status){if(status==='unseen')delete progress[id];else progress[id]={status:status,updatedAt:new Date().toISOString()};saveProgress();const oldId=filtered[index]&&filtered[index].id;filtered=currentCards();const nextIndex=filtered.findIndex(c=>c.id===oldId);index=Math.max(0,nextIndex===-1?Math.min(index,filtered.length-1):nextIndex);render()}
    function applyFilter(next){topic=next;filtered=currentCards();index=0;answerOpen=false;renderFilters();render()}
    document.getElementById('filters').addEventListener('click',e=>{const b=e.target.closest('button');if(b)applyFilter(b.dataset.topic)});
    document.getElementById('prevBtn').addEventListener('click',()=>{if(!filtered.length)return;index=(index-1+filtered.length)%filtered.length;answerOpen=false;render()});
    document.getElementById('nextBtn').addEventListener('click',()=>{if(!filtered.length)return;index=(index+1)%filtered.length;answerOpen=false;render()});
    document.getElementById('copyBtn').addEventListener('click',async()=>{const text=document.getElementById('exportText').value;try{await navigator.clipboard.writeText(text)}catch(e){document.getElementById('exportText').select();document.execCommand('copy')}const toast=document.getElementById('toast');toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1400)});
    document.getElementById('resetBtn').addEventListener('click',()=>{if(confirm('記録を全部リセットしますか？')){progress={};saveProgress();filtered=currentCards();index=0;answerOpen=false;render()}});
    renderFilters();render();
  </script>
</body>
</html>
