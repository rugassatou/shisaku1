  <script>
    const cards = JSON.parse(document.getElementById('cards-data').textContent);
    const topics = ['全部','未','×復習','〇済','経営分析','CVP','NPV','記述問題','ROI'];
    const storageKey = 'case4-insight-progress-v1';
    let progress = loadProgress();
    let topic = '全部';
    let filtered = cards.slice();
    let index = 0;
    function loadProgress(){try{return JSON.parse(localStorage.getItem(storageKey) || '{}')}catch(e){return {}}}
    function saveProgress(){try{localStorage.setItem(storageKey, JSON.stringify(progress))}catch(e){}}
    function esc(value){return String(value == null ? '' : value).replace(/[&<>"']/g,function(s){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]})}
    function statusOf(id){return progress[id] && progress[id].status ? progress[id].status : 'unseen'}
    function statusLabel(s){return s === 'ok' ? '〇知っている' : s === 'bad' ? '×知らない' : '未'}
    function currentCards(){if(topic==='全部')return cards.slice();if(topic==='未')return cards.filter(c=>statusOf(c.id)==='unseen');if(topic==='×復習')return cards.filter(c=>statusOf(c.id)==='bad');if(topic==='〇済')return cards.filter(c=>statusOf(c.id)==='ok');return cards.filter(c=>c.topic===topic)}
    function renderStats(){const ok=cards.filter(c=>statusOf(c.id)==='ok').length;const bad=cards.filter(c=>statusOf(c.id)==='bad').length;const unseen=cards.length-ok-bad;document.getElementById('stats').innerHTML='<div class="stat"><strong>'+ok+'</strong><span>〇知っている</span></div><div class="stat"><strong>'+bad+'</strong><span>×復習</span></div><div class="stat"><strong>'+unseen+'</strong><span>未</span></div>'}
    function renderFilters(){document.getElementById('filters').innerHTML=topics.map(t=>'<button class="'+(t===topic?'active':'')+'" data-topic="'+esc(t)+'">'+esc(t)+'</button>').join('')}
    function renderExport(){const ok=cards.filter(c=>statusOf(c.id)==='ok');const bad=cards.filter(c=>statusOf(c.id)==='bad');const unseen=cards.length-ok.length-bad.length;const lines=[];lines.push('事例IV 気付きリスト記録 '+new Date().toLocaleString('ja-JP'));lines.push('合計:'+cards.length+' 〇知っている:'+ok.length+' ×知らない:'+bad.length+' 未:'+unseen);lines.push('');lines.push('【×復習】');if(!bad.length)lines.push('なし');bad.forEach((c,i)=>lines.push((i+1)+'. ['+c.topic+'/'+c.difficulty+'] '+c.title+' - '+c.main_insight));lines.push('');lines.push('【〇知っている】');if(!ok.length)lines.push('なし');ok.forEach((c,i)=>lines.push((i+1)+'. ['+c.topic+'] '+c.title));document.getElementById('exportText').value=lines.join('\n')}
    function render(){renderStats();renderExport();const c=filtered[index];document.getElementById('sourceText').textContent=cards.length+' cards';document.getElementById('positionText').textContent=filtered.length?(index+1)+' / '+filtered.length:'0 / 0';if(!c){document.getElementById('card').innerHTML='<p class="note">カードがありません。</p>';return}const s=statusOf(c.id);const meta=[c.topic,c.difficulty,c.year,c.question_no,statusLabel(s)].filter(Boolean);const chips=meta.map(m=>'<span class="chip'+(m.indexOf('×')===0?' bad':m.indexOf('〇')===0?' ok':'')+'">'+esc(m)+'</span>').join('');const list=c.insights.map(x=>'<li><strong>'+esc(x.notice)+'</strong><span>'+esc(x.action)+'</span></li>').join('');document.getElementById('card').innerHTML='<div class="meta">'+chips+'</div><h2>'+esc(c.title)+'</h2><p class="caption">最重要の気付き</p><div class="main">'+esc(c.main_insight)+'</div><p class="caption">気付きリスト</p><ul class="insights">'+list+'</ul><p class="caption">自己判定</p><div class="judge"><button class="ok '+(s==='ok'?'active':'')+'" data-judge="ok">〇知っている</button><button class="bad '+(s==='bad'?'active':'')+'" data-judge="bad">×知らない</button><button class="clear '+(s==='unseen'?'active':'')+'" data-judge="unseen">未に戻す</button></div>';document.querySelectorAll('[data-judge]').forEach(btn=>btn.addEventListener('click',()=>setJudge(c.id,btn.dataset.judge)))}
    function setJudge(id,status){if(status==='unseen')delete progress[id];else progress[id]={status:status,updatedAt:new Date().toISOString()};saveProgress();const oldId=filtered[index]&&filtered[index].id;filtered=currentCards();const nextIndex=filtered.findIndex(c=>c.id===oldId);index=Math.max(0,nextIndex===-1?Math.min(index,filtered.length-1):nextIndex);render()}
    function applyFilter(next){topic=next;filtered=currentCards();index=0;renderFilters();render()}
    document.getElementById('filters').addEventListener('click',e=>{const b=e.target.closest('button');if(b)applyFilter(b.dataset.topic)});
    document.getElementById('prevBtn').addEventListener('click',()=>{if(!filtered.length)return;index=(index-1+filtered.length)%filtered.length;render()});
    document.getElementById('nextBtn').addEventListener('click',()=>{if(!filtered.length)return;index=(index+1)%filtered.length;render()});
    document.getElementById('copyBtn').addEventListener('click',async()=>{const text=document.getElementById('exportText').value;try{await navigator.clipboard.writeText(text)}catch(e){document.getElementById('exportText').select();document.execCommand('copy')}const toast=document.getElementById('toast');toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1400)});
    document.getElementById('resetBtn').addEventListener('click',()=>{if(confirm('記録を全部リセットしますか？')){progress={};saveProgress();filtered=currentCards();index=0;render()}});
    renderFilters();render();
  </script>
</body>
</html>
