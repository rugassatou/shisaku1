    const topics = ["全部","未","×復習","〇済","経営分析","CVP","NPV","ODA","記述問題","ROI"];
    const storageKey = "case4-card-progress-v3";
    let progress = loadProgress();
    let topic = "全部";
    let filtered = cards.slice();
    let index = 0;
    let conditionOpen = false;
    let answerOpen = false;
    function loadProgress(){try{return JSON.parse(localStorage.getItem(storageKey) || "{}")}catch(e){return {}}}
    function saveProgress(){try{localStorage.setItem(storageKey, JSON.stringify(progress))}catch(e){}}
    function esc(value){return String(value == null ? "" : value).replace(/[&<>"']/g,function(s){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[s] || s})}
    function statusOf(id){return progress[id] && progress[id].status ? progress[id].status : "unseen"}
    function statusLabel(s){return s === "ok" ? "〇できた" : s === "bad" ? "×難しい" : "未"}
    function currentCards(){if(topic === "全部") return cards.slice(); if(topic === "未") return cards.filter(function(c){return statusOf(c.id) === "unseen"}); if(topic === "×復習") return cards.filter(function(c){return statusOf(c.id) === "bad"}); if(topic === "〇済") return cards.filter(function(c){return statusOf(c.id) === "ok"}); return cards.filter(function(c){return c.topic === topic})}
    function renderStats(){var ok=cards.filter(function(c){return statusOf(c.id)==="ok"}).length; var bad=cards.filter(function(c){return statusOf(c.id)==="bad"}).length; var unseen=cards.length-ok-bad; document.getElementById("stats").innerHTML='<div class="stat"><strong>'+ok+'</strong><span>〇できた</span></div><div class="stat"><strong>'+bad+'</strong><span>×復習</span></div><div class="stat"><strong>'+unseen+'</strong><span>未</span></div>'}
    function renderFilters(){document.getElementById("filters").innerHTML=topics.map(function(t){return '<button class="'+(t===topic?'active':'')+'" data-topic="'+esc(t)+'">'+esc(t)+'</button>'}).join("")}
    function renderExport(){var ok=cards.filter(function(c){return statusOf(c.id)==="ok"}); var bad=cards.filter(function(c){return statusOf(c.id)==="bad"}); var unseen=cards.length-ok.length-bad.length; var lines=[]; lines.push('事例IVカード記録 '+new Date().toLocaleString('ja-JP')); lines.push('合計:'+cards.length+' 〇:'+ok.length+' ×:'+bad.length+' 未:'+unseen); lines.push(''); lines.push('【×復習】'); if(!bad.length) lines.push('なし'); bad.forEach(function(c,i){lines.push((i+1)+'. ['+c.topic+'/'+c.difficulty+'] '+c.title+' - '+c.hook)}); lines.push(''); lines.push('【〇できた】'); if(!ok.length) lines.push('なし'); ok.forEach(function(c,i){lines.push((i+1)+'. ['+c.topic+'] '+c.title)}); document.getElementById('exportText').value=lines.join('\n')}
    function render(){renderStats(); renderExport(); var c=filtered[index]; document.getElementById('sourceText').textContent=cards.length+' cards'; document.getElementById('positionText').textContent=filtered.length ? (index+1)+' / '+filtered.length : '0 / 0'; if(!c){document.getElementById('card').innerHTML='<p class="note">カードがありません。</p>';return} var s=statusOf(c.id); var meta=[c.topic,c.difficulty,c.year,c.question_no,statusLabel(s)].filter(Boolean); var chips=meta.map(function(m){var cls=m.indexOf('×')===0?' bad':m.indexOf('〇')===0?' ok':''; return '<span class="chip'+cls+'">'+esc(m)+'</span>'}).join(''); var rows=c.condition_table.map(function(r){return '<tr><th>'+esc(r[0])+'</th><td>'+esc(r[1])+'</td></tr>'}).join(''); var steps=c.solve_steps.map(function(st){return '<li>'+esc(st.notice)+'<span>'+esc(st.action)+'</span></li>'}).join(''); document.getElementById('card').innerHTML='<div class="meta">'+chips+'</div><h2>'+esc(c.title)+'</h2><p class="caption">問題文</p><div class="problem">'+esc(c.problem_text)+'</div><p class="caption">自己判定</p><div class="judge"><button class="ok '+(s==='ok'?'active':'')+'" data-judge="ok">〇できた</button><button class="bad '+(s==='bad'?'active':'')+'" data-judge="bad">×難しい</button><button class="clear '+(s==='unseen'?'active':'')+'" data-judge="unseen">未に戻す</button></div><div class="reveal-row"><button id="toggleCondition">'+(conditionOpen?'条件表を隠す':'条件表を見る')+'</button><button id="toggleAnswer">'+(answerOpen?'気付き手順を隠す':'気付き手順を見る')+'</button></div><div class="hidden-block '+(conditionOpen?'show':'')+'" id="conditionBox"><p class="caption" style="margin-top:12px">条件表</p><table class="conditions"><tbody>'+rows+'</tbody></table></div><div class="hidden-block '+(answerOpen?'show':'')+'" id="answerBox"><div class="hook">'+esc(c.hook)+'</div><ol>'+steps+'</ol></div>'; document.querySelectorAll('[data-judge]').forEach(function(btn){btn.addEventListener('click',function(){setJudge(c.id,btn.dataset.judge)})}); document.getElementById('toggleCondition').addEventListener('click',function(){conditionOpen=!conditionOpen;render()}); document.getElementById('toggleAnswer').addEventListener('click',function(){answerOpen=!answerOpen;render()})}
    function setJudge(id,status){if(status==='unseen') delete progress[id]; else progress[id]={status:status,updatedAt:new Date().toISOString()}; saveProgress(); var oldId=filtered[index] && filtered[index].id; filtered=currentCards(); var nextIndex=filtered.findIndex(function(c){return c.id===oldId}); index=Math.max(0,nextIndex===-1?Math.min(index,filtered.length-1):nextIndex); render()}
    function applyFilter(next){topic=next; filtered=currentCards(); index=0; conditionOpen=false; answerOpen=false; renderFilters(); render()}
    document.getElementById('filters').addEventListener('click',function(e){var b=e.target.closest('button'); if(b) applyFilter(b.dataset.topic)});
    document.getElementById('prevBtn').addEventListener('click',function(){if(!filtered.length)return; index=(index-1+filtered.length)%filtered.length; conditionOpen=false; answerOpen=false; render()});
    document.getElementById('nextBtn').addEventListener('click',function(){if(!filtered.length)return; index=(index+1)%filtered.length; conditionOpen=false; answerOpen=false; render()});
    document.getElementById('copyBtn').addEventListener('click',async function(){var text=document.getElementById('exportText').value; try{await navigator.clipboard.writeText(text)}catch(e){document.getElementById('exportText').select(); document.execCommand('copy')} var toast=document.getElementById('toast'); toast.classList.add('show'); setTimeout(function(){toast.classList.remove('show')},1400)});
    document.getElementById('resetBtn').addEventListener('click',function(){if(confirm('記録を全部リセットしますか？')){progress={}; saveProgress(); filtered=currentCards(); index=0; conditionOpen=false; answerOpen=false; render()}});
    renderFilters(); render();
