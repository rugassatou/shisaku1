<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>刹那の見切り Ver2.0</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    max-width:1000px;
    margin:auto;
    padding-top:20px;
}

h1{
    color:#ffd700;
}

#arena{
    height:420px;
    border:3px solid #555;
    border-radius:20px;
    margin:30px;
    display:flex;
    justify-content:space-around;
    align-items:center;
    background:#222;
    transition:0.1s;
}

.green{
    background:#1d6b38 !important;
}

#playerWrap,
#enemyWrap{
    position:relative;
    width:320px;
    height:320px;
    display:flex;
    justify-content:center;
    align-items:center;
}

#player,
#enemy{
    width:220px;
    height:220px;
    object-fit:contain;
}

.effect{
    position:absolute;
    top:-90px;
    left:50%;
    transform:translateX(-50%);
    width:150px;
    display:none;
    pointer-events:none;
}

.character{
    font-size:120px;
}

#message{
    font-size:34px;
    min-height:90px;
}

#result{
    font-size:34px;
    min-height:120px;
    margin-top:20px;
}

button{
    font-size:28px;
    padding:12px 40px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.win{
    color:#00ff88;
}

.lose{
    color:#ff5555;
}

</style>

</head>

<body>

<div class="container">

<h1>刹那の見切り</h1>

<div id="arena">

<div id="playerWrap">

<img
id="player"
src="P1.png">

<img
id="playerEffect"
class="effect"
src="">

</div>

<div style="font-size:50px;">
VS
</div>

<div id="enemyWrap">

<div
id="enemyEmoji"
class="character">
👺
</div>

<img
id="enemy"
src=""
style="display:none;">

</div>

</div>

<div id="message">
STARTを押せ
</div>

<div id="result"></div>

<button
id="startBtn"
onclick="startGame()">
START </button>

</div>

<script>

let state = "idle";
let attackTime = 0;
let audioCtx = null;

let stage = 1;
let stage3Wins = 0;
let gameCleared = false;

function getBorder(){

    if(stage === 1){
        return 30;
    }

    if(stage === 2){
        return 25;
    }

    if(stage3Wins >= 2){
        return 17;
    }

    return 18;
}

function showEnemy(){

    const emoji =
        document.getElementById(
            "enemyEmoji"
        );

    const image =
        document.getElementById(
            "enemy"
        );

    if(stage === 1){

        emoji.style.display =
            "block";

        image.style.display =
            "none";

        emoji.innerHTML =
            "👺";
    }

    else if(stage === 2){

        emoji.style.display =
            "none";

        image.style.display =
            "block";

        image.src =
            "E2.png";

        image.style.width =
            "220px";

        image.style.height =
            "220px";

        image.style.left =
            "0px";
    }

    else{

        emoji.style.display =
            "none";

        image.style.display =
            "block";

        image.src =
            "E3.png";

        image.style.width =
            "520px";

        image.style.height =
            "520px";

        image.style.position =
            "relative";

        image.style.left =
            "100px";
    }
}
function playBeep(){


if(!audioCtx){
    return;
}

const osc =
    audioCtx.createOscillator();

const gain =
    audioCtx.createGain();

osc.frequency.value =
    1800;

gain.gain.value =
    0.05;

osc.connect(gain);

gain.connect(
    audioCtx.destination
);

osc.start();

setTimeout(()=>{
    osc.stop();
},40);


}

function startGame(){


if(state !== "idle"){
    return;
}

if(!audioCtx){

    audioCtx =
        new AudioContext();
}

document.getElementById(
    "player"
).src =
    "P1.png";

document.getElementById(
    "playerEffect"
).style.display =
    "none";

showEnemy();

document.getElementById(
    "result"
).innerHTML = "";

document.getElementById(
    "arena"
).className = "";

if(stage === 3){

    document.getElementById(
        "message"
    ).innerHTML =

        "FINAL BOSS<br>"
        +
        stage3Wins
        +
        "/3 勝<br>"
        +
        "緑になったら上画面を押せ";
}

else{

    document.getElementById(
        "message"
    ).innerHTML =

        "STAGE "
        + stage
        + "<br>"
        + "緑になったら上画面を押せ";
}

state = "waiting";

const waitTime =

    1000
    +
    Math.random()
    *
    6000;

setTimeout(function(){

    if(state !== "waiting"){
        return;
    }

    state = "attack";

    document.getElementById(
        "arena"
    ).className =
        "green";

    document.getElementById(
        "message"
    ).innerHTML =
        "今だ！";

    playBeep();

    attackTime =
        performance.now();

},waitTime);

}

document
.getElementById("arena")
.addEventListener(

"click",

function(){

if(state === "waiting"){

    state = "idle";

    document.getElementById(
        "player"
    ).src =
        "P1lose.png";

    document.getElementById(
        "result"
    ).innerHTML =

        "<span class='lose'>フライング</span>";

    document.getElementById(
        "message"
    ).innerHTML =
        "STARTを押せ";

    stage = 1;

    stage3Wins = 0;

    return;
}

if(state !== "attack"){
    return;
}

state = "result";

const reaction =

    performance.now()
    -
    attackTime;

const frame =

    reaction
    /
    16.67;

const border =
    getBorder();

document.getElementById(
    "arena"
).className = "";


if(frame <= border){

    document.getElementById(
        "playerEffect"
    ).src =
        "win.png";

    document.getElementById(
        "playerEffect"
    ).style.display =
        "block";

    if(stage === 1){

        document.getElementById(
            "enemyEmoji"
        ).innerHTML =
            "💀";
    }

    else if(stage === 2){

        document.getElementById(
            "enemy"
        ).src =
            "Elose.png";
    }

    else{

        // Stage3は途中では画像変更しない
    }

    if(stage < 3){

        document.getElementById(
            "result"
        ).innerHTML =

            "<span class='win'>STAGE CLEAR</span>";

        stage++;
    }

    else{

        stage3Wins++;

        if(stage3Wins < 3){

            document.getElementById(
                "result"
            ).innerHTML =

                "<span class='win'>FINAL BOSS "
                + stage3Wins
                + "/3</span>";
        }

        else{

            document.getElementById(
                "enemy"
            ).src =
                "Elose.png";

            document.getElementById(
                "result"
            ).innerHTML =

                "<span class='win'>🏆 GAME CLEAR</span>"

                + "<br><br>"

                + "FINAL HIT"

                + "<br>"

                + frame.toFixed(1)

                + " F";

            document.getElementById(
                "message"
            ).innerHTML = "";

            document.getElementById(
                "startBtn"
            ).style.display =
                "none";

            gameCleared = true;

            stage = 1;

            stage3Wins = 0;
        }
    }
}

else{

    document.getElementById(
        "player"
    ).src =
        "P1lose.png";

    document.getElementById(
        "result"
    ).innerHTML =

        "<span class='lose'>GAME OVER</span>";

    stage = 1;

    stage3Wins = 0;
}

if(!gameCleared){

    document.getElementById(
        "message"
    ).innerHTML =

        reaction.toFixed(1)

        + " ms"

        + "<br>"

        + frame.toFixed(1)

        + " F"

        + "<br>"

        + "(目標 "

        + border

        + "F以内)";
}

setTimeout(function(){

    state = "idle";

    if(!gameCleared){

        document.getElementById(
            "message"
        ).innerHTML =
            "STARTを押せ";
    }

},2500);


});

</script>

</body>
</html>
