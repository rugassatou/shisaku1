<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>佐藤太郎</title>

<style>

body{
    background:#0d1117;
    color:#ffffff;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

h1{
    text-align:center;
    color:#00ff88;
}

.card{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(0,255,136,0.2);
}

.title{
    font-size:20px;
    margin-bottom:10px;
}

.progress-bar{
    width:100%;
    height:20px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    background:linear-gradient(
        90deg,
        #00ff88,
        #00ccff
    );
}

.percent{
    margin-top:10px;
    font-size:18px;
}

.clock{
    font-size:28px;
    text-align:center;
    color:#00ff88;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>佐藤太郎</h1>

<div class="card">
    <div class="title">
        診断士
    </div>

    <div class="progress-bar">
        <div class="progress-fill"
             style="width:5%;">
        </div>
    </div>

    <div class="percent">
        10 / 180 時間 (5%)
    </div>
</div>

<div class="card">
    <div class="title">
        設計自動化
    </div>

    <div class="progress-bar">
        <div class="progress-fill"
             style="width:10%;">
        </div>
    </div>

    <div class="percent">
        2 / 20 時間 (10%)
    </div>
</div>

<div class="card">
    <div class="title">
        現在時刻
    </div>

    <div class="clock" id="clock">
        読み込み中...
    </div>
</div>

</div>

<script>

function updateClock(){

    const now = new Date();

    document.getElementById("clock").innerHTML =
        now.toLocaleString("ja-JP");

}

updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
