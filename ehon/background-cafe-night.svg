<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1C4D"/>
      <stop offset="1" stop-color="#3D2A67"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 170) rotate(90) scale(180)">
      <stop stop-color="#FFF3C4" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFF3C4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7C4B3B"/>
      <stop offset="1" stop-color="#5E352A"/>
    </linearGradient>
    <pattern id="grain" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1" fill="#FFFFFF" fill-opacity="0.05"/>
      <circle cx="22" cy="30" r="1" fill="#FFFFFF" fill-opacity="0.04"/>
      <circle cx="32" cy="12" r="1" fill="#FFFFFF" fill-opacity="0.03"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect width="1600" height="1000" fill="url(#grain)"/>
  <circle cx="1280" cy="170" r="68" fill="#FFF2B8"/>
  <circle cx="1280" cy="170" r="180" fill="url(#moonGlow)"/>

  <g fill="#FFFFFF" fill-opacity="0.85">
    <circle cx="180" cy="120" r="3"/>
    <circle cx="250" cy="180" r="2.5"/>
    <circle cx="430" cy="90" r="2.8"/>
    <circle cx="530" cy="210" r="2"/>
    <circle cx="740" cy="130" r="2.7"/>
    <circle cx="860" cy="80" r="2.4"/>
    <circle cx="980" cy="210" r="2.1"/>
    <circle cx="1160" cy="110" r="2.6"/>
    <circle cx="1420" cy="240" r="2.3"/>
  </g>

  <rect x="0" y="670" width="1600" height="330" fill="url(#counter)"/>
  <rect x="0" y="650" width="1600" height="24" fill="#9F6A53"/>

  <g opacity="0.4">
    <rect x="120" y="300" width="220" height="220" rx="16" fill="#F3E7D8"/>
    <rect x="390" y="330" width="220" height="190" rx="16" fill="#F3E7D8"/>
    <rect x="660" y="280" width="220" height="240" rx="16" fill="#F3E7D8"/>
    <rect x="930" y="340" width="220" height="180" rx="16" fill="#F3E7D8"/>
  </g>

  <g opacity="0.35" fill="#FFD99A">
    <ellipse cx="240" cy="640" rx="85" ry="20"/>
    <ellipse cx="520" cy="640" rx="95" ry="24"/>
    <ellipse cx="790" cy="640" rx="90" ry="22"/>
    <ellipse cx="1070" cy="640" rx="88" ry="21"/>
    <ellipse cx="1340" cy="640" rx="82" ry="20"/>
  </g>
</svg>
