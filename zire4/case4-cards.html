<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>事例IVカード</title>
  <style>
    :root {
      --bg: #f5f3ee;
      --ink: #171615;
      --muted: #746f66;
      --panel: #fff;
      --line: #ddd6ca;
      --green: #176b5d;
      --red: #c4482f;
      --soft: #edf6f2;
      --shadow: 0 16px 42px rgba(30, 27, 23, .08);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #fbfaf7, var(--bg));
      color: var(--ink);
    }
    .screen {
      width: min(520px, 100%);
      margin: 0 auto;
      padding: 14px;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .label {
      color: var(--green);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .08em;
    }
    h1 {
      margin: 4px 0 0;
      font-size: 28px;
      line-height: 1.05;
    }
    .count {
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      white-space: nowrap;
    }
    .panel {
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(221,214,202,.92);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px;
    }
    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 8px 12px;
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }
    button.active {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .card {
      display: grid;
      gap: 10px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      border-radius: 999px;
      background: var(--soft);
      color: var(--green);
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 800;
    }
    h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.3;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .hook {
      border-left: 4px solid var(--green);
      padding: 9px 10px;
      background: #f8fbf9;
      color: #29453f;
      font-size: 13px;
      line-height: 1.55;
    }
    ol {
      margin: 0;
      padding-left: 22px;
      display: grid;
      gap: 9px;
    }
    li {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.55;
    }
    li span {
      display: block;
      color: var(--muted);
      margin-top: 2px;
    }
    .nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .nav button {
      border-radius: 8px;
      padding: 11px;
    }
    .error {
      background: #fff0eb;
      border-color: #f0c9bd;
      color: #773f31;
      line-height: 1.6;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="screen">
    <header>
      <div>
        <div class="label">CASE IV CARDS</div>
        <h1>何に気付けば<br>解けるか</h1>
      </div>
      <div class="count">
        <div id="sourceText">読込中</div>
        <div id="positionText">- / -</div>
      </div>
    </header>

    <section class="panel">
      <div class="filters" id="filters"></div>
    </section>

    <section class="panel card" id="card"></section>

    <section class="panel nav">
      <button id="prevBtn">前のカード</button>
      <button id="nextBtn">次のカード</button>
    </section>
  </main>

  <script>
    const topics = ["全部", "経営分析", "CVP", "NPV", "ODA", "記述問題", "ROI"];
    let cards = [];
    let filtered = [];
    let topic = "全部";
    let index = 0;

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (s) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[s]));
    }

    function renderFilters() {
      const box = document.getElementById("filters");
      box.innerHTML = topics.map((t) => `<button class="${t === topic ? "active" : ""}" data-topic="${esc(t)}">${esc(t)}</button>`).join("");
    }

    function renderCard() {
      const el = document.getElementById("card");
      if (!filtered.length) {
        el.innerHTML = '<div class="error">カードがありません。</div>';
        document.getElementById("positionText").textContent = "0 / 0";
        return;
      }
      const c = filtered[index];
      document.getElementById("positionText").textContent = `${index + 1} / ${filtered.length}`;
      document.getElementById("sourceText").textContent = `${cards.length} cards`;
      const meta = [c.topic, c.difficulty, c.year, c.time_limit_minutes ? `${c.time_limit_minutes}分` : "", c.score ? `${c.score}点` : ""].filter(Boolean);
      el.innerHTML = `
        <div class="meta">${meta.map((m) => `<span class="chip">${esc(m)}</span>`).join("")}</div>
        <h2>${esc(c.title)}</h2>
        <p>${esc(c.problem_summary)}</p>
        <div class="hook">${esc(c.specific_hook)}</div>
        <ol>
          ${c.solve_steps.map((s) => `<li>${esc(s.notice)}<span>${esc(s.action)}</span></li>`).join("")}
        </ol>
      `;
    }

    function applyFilter(nextTopic) {
      topic = nextTopic;
      filtered = topic === "全部" ? cards : cards.filter((c) => c.topic === topic);
      index = 0;
      renderFilters();
      renderCard();
    }

    document.getElementById("filters").addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (button) applyFilter(button.dataset.topic);
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      if (!filtered.length) return;
      index = (index - 1 + filtered.length) % filtered.length;
      renderCard();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      if (!filtered.length) return;
      index = (index + 1) % filtered.length;
      renderCard();
    });

    fetch("data/shindanshi_case4_cards.json")
      .then((res) => {
        if (!res.ok) throw new Error("JSONを読み込めませんでした。");
        return res.json();
      })
      .then((data) => {
        cards = data.cards || [];
        applyFilter("全部");
      })
      .catch((error) => {
        document.getElementById("sourceText").textContent = "読込失敗";
        document.getElementById("filters").innerHTML = "";
        document.getElementById("card").innerHTML = `<div class="error">${esc(error.message)}<br>ローカルで確認する場合は、このフォルダで簡易サーバーを起動してください。</div>`;
      });

    renderFilters();
  </script>
</body>
</html>
