<script>
const problems = [
{no:1, topic:'民法・使用者責任/共同不法行為', correct:null, q:'宅地建物取引業者Aの被用者Bと、宅地建物取引業者C（個人）が、A及びCの事業の執行につき、共同してD及びEに対し虚偽の事実を告げ、これが不法行為と認められた場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。', c:['CがDに対して損害の全額について賠償した場合、Cは、Bに対して求償権を行使することができる。','事業の執行は行為の外形から客観的に判断されるため、Dは、Bの行為が職務執行の範囲外であったことを知っていた場合でも、Aに対して損害賠償を求めることができる。','D及びEは、当該不法行為によって生じた損害について、それぞれ別個独立の権利として、Aに対し、その全額の賠償を請求することができる。','AがEに対して損害の全額について賠償した場合、Aは、Bに対しても、Cに対しても求償権を行使することができる。']},
{no:2, topic:'民法・委任/媒介報酬', correct:null, q:'Aが所有する建物の売買契約の締結をBに対して委任した場合の条件に関する次の記述のうち、民法の規定によれば、正しいものはどれか。', c:['委任契約をする際に成功報酬を支払う旨の合意をしている場合で、Aが、Bの見つけた買主Cと直接当該建物の売買契約を締結し、Bとの委任契約を解除したとき、Bは、契約の際に定めた額の成功報酬を請求することができる。','Aは、Bと委任契約をする際に「Aが自ら売主として直接売買契約を締結した場合には、AがBに違約金を支払う。」旨の合意をしていた。この場合において、BがAに違約金を支払わせるために不正にDをそのかいにより、AD間で直接の売買契約を締結させたときであっても、Bは、Aに対して、違約金の支払を請求することができる。','AとBが委任契約をする際に不法な条件を付した場合、その委任契約は無効となるが、不法な行為をしないことを条件とする場合は、その委任契約は常に有効となる。','AとBが委任契約をする際に成功報酬を支払う旨の合意をしている場合で、委任契約の締結時点で、既に当該建物が第三者の放火により滅失していたとき、Bは成功報酬の支払を請求することができる。']},
{no:3, topic:'民法・制限行為能力者等', correct:null, q:'Aが締結した土地の売買契約（以下「甲契約」という。）の相手方に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。', c:['甲契約の売主Bが被保佐人であり、Bが保佐人の同意を得ずにAとの間で甲契約を締結した場合、Bの保佐人は、甲契約を取り消すことができる。','甲契約の売主Cが被補助人であり、Cが甲契約の締結について補助人の同意を得なければならないとする審判がされている場合において、Cの補助人がCの利益を害するおそれがないにもかかわらず同意をしないとき、家庭裁判所は、Cの請求により、甲契約の締結につき、補助人の同意に代わる許可を与えることができる。','甲契約の売主Dが甲契約を締結した時に意思能力を有していなかった場合、Dは、甲契約の締結後、取消しの意思表示をすることによって、甲契約を契約時にさかのぼって無効にすることができる。','甲契約の売主Eが成年被後見人であった場合、Eが事理を弁識する能力がある状態で甲契約の締結を行ったと認められるときであっても、Eの成年後見人は甲契約を取り消すことができる。']},
{no:4, topic:'民法・無権代理', correct:null, q:'Aが、Bの代理人としてB所有の甲地をCに売却する契約を締結した場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。なお、Bは、Aに代理権を与えたことはなく、かつ、代理権を与えた旨の表示をしたこともないものとする。', c:['Aの行為は、Bが追認したときは有効な代理行為となるが、この追認はCに対してしなければならず、Aに対して追認しても、有効となることはない。','Cは、Aに代理権がないことを知らなかった場合に限り、Bに対して追認をするかどうかを確答すべき旨の催告をすることができ、Bが確答をしないときは、Bが追認したものとみなされる。','Cは、Aに代理権がないことを知らなかった場合に限り、Bの追認があった後でも、当該契約を取り消すことができる。','Bが本件売買契約を追認しない場合、Aは、Cの選択に従い、Cに対して契約の履行又は損害賠償の責任を負うことがある。']},
{no:5, topic:'民法・売買/履行遅滞/解除', correct:null, q:'A所有の甲土地についてのAB間の売買契約に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。', c:['Bが、履行期に代金の全額を提供したにもかかわらず、Aが甲土地の引渡しを遅滞している場合、Bは、履行の催告をすることなく、契約を解除することができる。','AB共に履行の提供をすることなく履行期を過ぎた場合、AB共に履行遅滞の責任を負わなければならないが、ABいずれか一方の意思表示によって契約を解除することは認められる。','Bが甲土地をCに転売した後に、AがBの代金不払いを理由に契約を解除した場合において、Cが所有権移転登記を備えていたとき、Cは、Bの債務不履行の事実を知っていても、Aに対して甲土地の所有権を対抗することができる。','BがAに対して手付を交付している場合において、Bが、履行期に代金の全部を提供したにもかかわらず、Aが甲土地の引渡しを遅滞しているとき、Aは、既に受領している手付の額の倍額を現実に提供することにより、契約を解除することができる。']},
{no:6, topic:'民法・登記/相続/対抗関係', correct:null, q:'次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。', c:['AとBが土地を共同相続した場合で、遺産分割協議が成立する前にBが各種の書類を偽造したうえで自己の単独所有であるとしてB名義の所有権登記をし、その後当該土地をCに譲渡して所有権の移転登記をしたとき、AはCに対して、登記なくして自己の相続持分を主張することができる。','DがEから土地を買い受け、Fに転売したが、登記名義がEのままであるとき、Dは、Fに転売している以上、Eに対して、D名義に登記を移転するよう請求することができない。','Gが、H所有の土地上の建物を取得し、自ら当該建物の登記を経由した後に、Hから建物の収去及び土地の明渡しを求められた場合、Gは、当該建物をIに譲渡すれば、登記名義がGのままでも、建物の収去及び土地の明渡しの義務を免れることができる。','Jが、Kからその所有する建物を買い受けた後、Lに売却した場合において、KからJに所有権移転登記がまだ行われていないとき、Lは、Kに対して、当該建物の所有権を対抗することができない。']},
{no:7, topic:'民法・抵当権/物上代位', correct:null, q:'Aは、Bに対する債務の担保として、自己所有建物に抵当権を設定し、その登記をした後、当該建物をCに賃貸し、引き渡した。この場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。', c:['Aが債務不履行に陥ったとき、Bは、AがCに対して有する賃料債権をAが受領する前に差し押さえることによって、Cにその支払を請求することができる。','Cが適法に当該建物をDに転貸していた場合において、Aの債務の弁済期が到来したときは、Bは当然にCがDに対して有する転貸賃料債権をCが受領する前に差し押さえることによって、Dにその支払を請求することができる。','Aが、Bに対する債務の支払を遅滞したため、抵当権が実行された場合、抵当権設定時に既に設置されていたエアコンにも抵当権の効力が及ぶ。','抵当権が実行され、Eが当該建物の買受人となった場合、Cは、Eが買い受けた時から6か月を経過するまで、当該建物の明渡しを猶予される。']},
{no:8, topic:'民法・個人根保証', correct:null, q:'一定の範囲に属する不特定の債務を主たる債務とする保証契約であって保証人が法人でないもの（個人根保証契約）に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。なお、個人根保証契約であってその主たる債務の範囲に金銭の貸渡し又は手形の割引を受けることによって負担する債務が含まれるもの（個人貸金等根保証契約）については考慮しないものとする。', c:['個人根保証契約は、書面又は契約の内容を記録した電磁的記録でしていれば、極度額の定めの有無を問わず効力を生じる。','主たる債務者と債権者の間に違約金の合意がない場合であっても、個人根保証契約の保証人は、債権者との間で、根保証債務についてのみ違約金の合意をすることができる。','保証人が破産手続開始の決定を受けた場合、個人根保証契約における主たる債務の元本は確定するが、主たる債務者が破産手続開始の決定を受けた場合、個人根保証契約における主たる債務の元本は確定しない。','主たる債務者又は保証人が死亡した場合、個人根保証契約における主たる債務の元本は確定する。']},
{no:9, topic:'民法・詐欺取消/第三者', correct:null, q:'AがBにだまされて自己所有の甲地をBに売却した後、Aが当該売却の意思表示を取り消す前にBがCに甲地を売却した場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。', c:['AB間の売買契約に関し、Aは、当該契約の締結はBの詐欺に基づくものであるとして、その取消しを主張することができるが、当該売買契約締結後20年を経過したときは、その取消しを主張することはできない。','AB間で売買契約を締結した後、Aは、Bの詐欺に気が付いたが、当該売買契約に基づき、Bに対し異議をとどめることなく所有権移転登記手続をし、代金を請求していた場合、Aは、Bの詐欺を理由にAB間の売買契約を取り消すことはできない。','所有権がAからBに移転している旨が登記されている甲地につき、CはBとの間で売買契約を締結して所有権移転登記をしたが、その後、AはBの詐欺に気づきAB間の売買契約を取り消した。この場合において、Cが、Bとの売買契約を締結する際に、Bによる詐欺の事実を知っていたとき、Aは、自己が甲地の所有者であることをCに対して主張することができる。','AがBの詐欺を理由にAB間の売買契約を取り消す前に、BがAB間の事情を過失なく知らないCに甲地を転売した場合、Cが所有権移転登記を備えていないのであれば、AはCから甲地を取り戻すことができる。']},
{no:10, topic:'民法・相続/配偶者と血族', correct:null, q:'Aが死亡した場合に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。', c:['Aの相続人が配偶者Bと子Cである場合、Bの遺留分も、Cの遺留分も、それぞれAの財産の4分の1の額となる。','Aの相続人が配偶者Bと母Dである場合、Bの遺留分はAの財産の3分の1の額であり、Dの遺留分はAの財産の6分の1の額となる。','Aの相続人が母Dと父Eである場合、Dの遺留分も、Eの遺留分も、それぞれAの財産の3分の1の額となる。','Aの相続人が配偶者Bと兄Fである場合、Bの遺留分はAの財産の2分の1の額であり、Fに遺留分はない。']},
{no:11, topic:'借地借家法・借地権', correct:null, q:'Aが建物を所有する目的で、Bから土地を賃借した場合に関する次の記述のうち、借地借家法の規定によれば、誤っているものはどれか。なお、借地借家法第22条に定める定期借地権及び同法第23条に定める事業用定期借地権については考慮しないものとする。', c:['AとBが契約により借地権の存続期間を定めた場合、25年と定めたときは30年と定めたものとして扱われ、40年と定めたときは、40年と定めたことになる。','「Aの借地権を消滅させるため、借地権の設定から20年経過後に、BがAの建物を時価で買い取り、契約は更新しない。」旨の特約を書面によってした場合、当該特約は有効である。','AとBが「一定の期間、借賃を増額しない。」旨の特約をした場合、当初定めた借賃が経済事情の変動などによって不相当となったとしても、Bは当該期間中、Aに対して、将来に向かって借賃の増額を請求することができない。','本件契約の更新の後において、Aが残存期間を超えて存続すべき建物を新たに築造することにつきやむを得ない事情があるにもかかわらず、Bがその建物の築造を承諾しないときは、Bが土地の賃貸借の解約の申入れをすることができない旨を定めた場合を除き、裁判所は、Aの申立てにより、Bの承諾に代わる許可を与えることができる。']},
{no:12, topic:'借地借家法・建物賃貸借', correct:null, q:'A所有の甲建物につき、Bとの間で賃貸借契約（以下「本件契約」という。）が締結され、BがAに敷金を交付したうえで甲建物に居住している場合に関する次の記述のうち、民法及び借地借家法の規定によれば、誤っているものはどれか。なお、定期建物賃貸借、取壊し予定の建物の賃貸借及び一時使用目的の建物の賃貸借は考慮しないものとし、賃料の滞納等の特別な事情はないものとする。', c:['本件契約が期間の定めのある建物賃貸借である場合、Aが、期間満了の1年前から6か月前までの間に、更新しない旨の通知を出すのを失念したときは、本件契約の期間満了時にAに借地借家法第28条に定める正当事由がある場合でも、本件契約は期間満了により終了しない。','本件契約期間中にAが甲建物をCに譲渡し、所有権移転登記がなされた場合、CはBに対して賃貸人の地位を主張して、賃料請求をすることができる。','本件契約期間中にAが甲建物をDに譲渡したとき、Dが甲建物について所有権移転登記を受けていなくても、Bは、本件契約が終了し甲建物を明け渡した後に、Dに対して敷金の返還を請求することができる。','BがAの同意を得て、自己の費用で甲建物に造作を設置した場合、「Aは、賃貸借契約終了の際、造作の買取りをしない。」という特約があるときでも、この特約はBに不利なものであるから、賃貸借終了時に、Bは、Aに対して時価でその造作を買い取るべきことを請求することができる。']},
{no:13, topic:'区分所有法・集会/管理', correct:null, q:'建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。', c:['集会の招集の通知は、会日より少なくとも1週間前に、会議の目的たる事項及び議案の要領を示して、各区分所有者（議決権を有しないものを除く。）に発しなければならない。ただし、この期間は、規約で伸長することはできない。','一部共用部分の管理のうち、区分所有者全員の利害に関係するもの又は区分所有者全員の規約に定めがあるものは区分所有者全員で、その他のものはこれを共用すべき区分所有者のみで行う。','建物内に住所を有する区分所有者又は通知を受けるべき場所を通知しない区分所有者に対する集会の招集の通知は、規約に特別の定めがある場合は、建物内の見やすい場所に掲示してすることができる。','区分所有者の承諾を得て専有部分を占有する者は、会議の目的たる事項につき利害関係を有する場合には、集会に出席して意見を述べることができるが、自己の議決権を行使することはできない。']},
{no:14, topic:'不動産登記法・申請義務', correct:null, q:'不動産登記の申請義務に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。', c:['建物が火災により全焼して滅失した場合、表題部所有者又は所有権の登記名義人は、当該建物が滅失した日から1月以内に、建物の滅失の登記の申請をしなければならない。','新築した建物又は区分建物以外の表題登記がない建物の所有権を取得した者は、その所有権の取得の日から1月以内に、所有権の保存の登記の申請をしなければならない。','所有権の登記名義人に相続が開始した場合、当該不動産を相続により取得した者は、自己のために相続の開始があったことを知り、かつ、当該所有権を取得したことを知った日から3年以内に、所有権の移転の登記の申請をしなければならない。','建物について、その種類、構造及び床面積に変更があった場合、表題部所有者又は所有権の登記名義人は、その変更があった日から1月以内に、その登記事項に関する変更の登記の申請をしなければならない。']},

let answers = JSON.parse(localStorage.getItem('lecQuizAnswers') || '{}');
let filterMode = 'all';
const app = document.getElementById('app');
function save(){localStorage.setItem('lecQuizAnswers', JSON.stringify(answers));}
function render(){
  const kw = document.getElementById('search').value.trim();
  app.innerHTML = '';
  problems.filter(p => {
    const text = [p.no,p.topic,p.q,...p.c].join(' ');
    if(filterMode==='unanswered' && answers[p.no]) return false;
    return !kw || text.includes(kw);
  }).forEach(p => {
    const card = document.createElement('section'); card.className='card'; card.dataset.no=p.no;
    const selected = answers[p.no];
    card.innerHTML = `<div class="qhead"><div class="qno">問${p.no}</div><div class="tag">${p.topic}</div></div><div class="question">${escapeHtml(p.q)}</div><div class="choices">${p.c.map((x,i)=>`<div class="choice ${selected==i+1?'selected':''}" onclick="selectAnswer(${p.no},${i+1})"><b>${i+1}.</b> ${escapeHtml(x)}</div>`).join('')}</div><div class="result">あなたの選択：${selected ? selected : '未回答'}　/　正解：${p.correct ?? '未入力'}</div>`;
    app.appendChild(card);
  });
}
function selectAnswer(no,n){answers[no]=n;save();render();}
function showAll(){filterMode='all';render();}
function showUnanswered(){filterMode='unanswered';render();}
function resetAll(){if(confirm('回答を全部消しますか？')){answers={};save();render();}}
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
document.getElementById('search').addEventListener('input', render);
render();
</script>
