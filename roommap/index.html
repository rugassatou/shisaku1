<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>収納・消耗品管理</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#222;--muted:#667085;--line:#ddd;--accent:#ff7a00;--blue:#1570ef;--red:#b42318;--green:#067647}
*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text)}
header{position:sticky;top:0;background:#ffffffee;backdrop-filter:blur(8px);z-index:10;border-bottom:1px solid var(--line);padding:10px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
h1{font-size:17px;margin:0 10px 0 0}.tabBtn,button{border:1px solid #d0d5dd;background:#fff;border-radius:10px;padding:8px 10px;font-weight:700;cursor:pointer}.tabBtn.active{background:var(--accent);border-color:var(--accent);color:#fff}.primary{background:var(--blue);border-color:var(--blue);color:#fff}.danger{color:var(--red);border-color:#fecdca;background:#fff5f5}
main{max-width:1180px;margin:0 auto;padding:14px}.tab{display:none}.tab.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:12px 0;box-shadow:0 1px 3px #00000008}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}@media(max-width:850px){.grid{grid-template-columns:1fr}}
input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:10px;padding:8px;font:inherit;background:#fff} label{display:block;font-size:12px;font-weight:800;color:#344054;margin:8px 0 3px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.grow{flex:1}.muted{color:var(--muted);font-size:12px;line-height:1.6}.pill{display:inline-block;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:800;margin:2px;background:#eef4ff;color:#175cd3}.pill.red{background:#fff1f3;color:#c01048}.pill.green{background:#ecfdf3;color:#067647}.pill.orange{background:#fff7ed;color:#c4320a}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}th,td{border-bottom:1px solid #eee;padding:8px;text-align:left;vertical-align:top;font-size:14px}th{background:#f8fafc;font-size:12px;color:#344054}.nowrap{white-space:nowrap}.photoRefs{font-size:12px;color:#475467}
.itemTitle{font-weight:900;font-size:18px}.section h2{margin:6px 0 8px}.section li{line-height:1.8;margin:4px 0}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}@media(max-width:850px){.summary{grid-template-columns:1fr 1fr}}
.summary .box{background:#fff;border:1px solid #ddd;border-radius:14px;padding:12px}.num{font-size:24px;font-weight:900}
</style>
</head>
<body>
<header>
  <h1>収納・消耗品管理</h1>
  <button class="tabBtn active" data-tab="consumables">消耗品</button>
  <button class="tabBtn" data-tab="products">収納物</button>
  <button class="tabBtn" data-tab="advice">片付けアドバイス</button>
  <button id="exportBtn" class="primary">編集JSON出力</button>
  <button id="importBtn">JSON読込</button>
  <input id="importFile" type="file" accept="application/json" hidden>
</header>

<main>
  <section class="card">
    <div class="row">
      <div class="grow">
        <label>検索</label>
        <input id="q" placeholder="例：ラップ、洗剤、トイレ、キッチン">
      </div>
      <div>
        <label>優先度</label>
        <select id="priorityFilter"><option value="">すべて</option><option>高</option><option>中</option><option>低</option></select>
      </div>
      <div>
        <label>状態</label>
        <select id="dueFilter"><option value="">すべて</option><option value="overdue">期限超過</option><option value="soon">30日以内</option><option value="nostock">ストックなし</option></select>
      </div>
    </div>
    <p class="muted">GitHub公開時は <code>data/consumables.json</code> / <code>data/products.json</code> / <code>data/advice.json</code> を自動読込します。ローカルで開いて読めない場合は「JSON読込」で読み込んでください。</p>
  </section>

  <section id="consumables" class="tab active">
    <div class="summary" id="summary"></div>
    <div id="consumableList"></div>
  </section>

  <section id="products" class="tab">
    <div id="productList"></div>
  </section>

  <section id="advice" class="tab">
    <div id="adviceList"></div>
  </section>
</main>

<script>
const state = { consumables:{items:[]}, products:{items:[]}, advice:{sections:[]} };
const today = new Date();
function parseDate(s){ if(!s) return null; const d = new Date(s+"T00:00:00"); return isNaN(d)?null:d; }
function fmtDate(d){ if(!d) return ""; return d.toISOString().slice(0,10); }
function daysSince(s){ const d=parseDate(s); if(!d) return ""; return Math.floor((today-d)/(1000*60*60*24)); }
function nextDate(s,cycle){ const d=parseDate(s); if(!d || !cycle) return ""; const n=new Date(d); n.setDate(n.getDate()+Number(cycle)); return fmtDate(n); }
function daysUntil(dateStr){ const d=parseDate(dateStr); if(!d) return null; return Math.ceil((d-today)/(1000*60*60*24)); }
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
async function loadJson(path, key){
  try{
    const res = await fetch(path, {cache:"no-store"});
    if(!res.ok) throw new Error(res.status);
    state[key] = await res.json();
  }catch(e){ console.warn("load failed", path, e); }
}
async function init(){
  await Promise.all([
    loadJson("data/consumables.json","consumables"),
    loadJson("data/products.json","products"),
    loadJson("data/advice.json","advice")
  ]);
  renderAll();
}
function filteredConsumables(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const pf=document.getElementById("priorityFilter").value;
  const df=document.getElementById("dueFilter").value;
  return (state.consumables.items||[]).filter(it=>{
    const hay=[it.name,it.category,it.room,it.storage,it.memo,it.buyPlace,it.stockStatus].join(" ").toLowerCase();
    if(q && !hay.includes(q)) return false;
    if(pf && it.priority!==pf) return false;
    const next = nextDate(it.lastPurchasedAt,it.expectedCycleDays);
    const until = daysUntil(next);
    if(df==="overdue" && !(until!==null && until<0)) return false;
    if(df==="soon" && !(until!==null && until>=0 && until<=30)) return false;
    if(df==="nostock" && it.stockStatus!=="なし") return false;
    return true;
  });
}
function renderSummary(){
  const items=state.consumables.items||[];
  const overdue=items.filter(it=>{const u=daysUntil(nextDate(it.lastPurchasedAt,it.expectedCycleDays)); return u!==null&&u<0}).length;
  const soon=items.filter(it=>{const u=daysUntil(nextDate(it.lastPurchasedAt,it.expectedCycleDays)); return u!==null&&u>=0&&u<=30}).length;
  const high=items.filter(it=>it.priority==="高").length;
  document.getElementById("summary").innerHTML = `
    <div class="box"><div class="muted">消耗品</div><div class="num">${items.length}</div></div>
    <div class="box"><div class="muted">優先度 高</div><div class="num">${high}</div></div>
    <div class="box"><div class="muted">30日以内</div><div class="num">${soon}</div></div>
    <div class="box"><div class="muted">期限超過</div><div class="num">${overdue}</div></div>`;
}
function renderConsumables(){
  const list=filteredConsumables();
  const html=list.map((it,idx)=>{
    const globalIdx=(state.consumables.items||[]).findIndex(x=>x.id===it.id);
    const since=daysSince(it.lastPurchasedAt);
    const next=nextDate(it.lastPurchasedAt,it.expectedCycleDays);
    const until=daysUntil(next);
    const duePill = next ? (until<0?`<span class="pill red">期限超過 ${Math.abs(until)}日</span>`: until<=30?`<span class="pill orange">あと${until}日</span>`:`<span class="pill green">あと${until}日</span>`) : `<span class="pill">未設定</span>`;
    return `<div class="card">
      <div class="row"><div class="itemTitle grow">${esc(it.name)}</div><span class="pill">${esc(it.category)}</span><span class="pill ${it.priority==='高'?'red':it.priority==='中'?'orange':'green'}">優先度 ${esc(it.priority)}</span>${duePill}</div>
      <div class="grid">
        <div><label>部屋</label><input data-kind="consumable" data-i="${globalIdx}" data-field="room" value="${esc(it.room)}"></div>
        <div><label>収納場所</label><input data-kind="consumable" data-i="${globalIdx}" data-field="storage" value="${esc(it.storage)}"></div>
        <div><label>買う場所</label><input data-kind="consumable" data-i="${globalIdx}" data-field="buyPlace" value="${esc(it.buyPlace)}"></div>
        <div><label>購入日</label><input type="date" data-kind="consumable" data-i="${globalIdx}" data-field="lastPurchasedAt" value="${esc(it.lastPurchasedAt||'')}"></div>
        <div><label>購入周期（日）</label><input type="number" data-kind="consumable" data-i="${globalIdx}" data-field="expectedCycleDays" value="${esc(it.expectedCycleDays||'')}"></div>
        <div><label>ストック状況</label><select data-kind="consumable" data-i="${globalIdx}" data-field="stockStatus"><option ${it.stockStatus==='あり'?'selected':''}>あり</option><option ${it.stockStatus==='少ない'?'selected':''}>少ない</option><option ${it.stockStatus==='なし'?'selected':''}>なし</option><option ${it.stockStatus==='不明'?'selected':''}>不明</option></select></div>
        <div><label>優先度</label><select data-kind="consumable" data-i="${globalIdx}" data-field="priority"><option ${it.priority==='高'?'selected':''}>高</option><option ${it.priority==='中'?'selected':''}>中</option><option ${it.priority==='低'?'selected':''}>低</option></select></div>
        <div><label>経過日数</label><input value="${since!==''?since+'日':'未設定'}" readonly></div>
        <div><label>次回購入目安</label><input value="${next||'未設定'}" readonly></div>
      </div>
      <label>メモ</label><textarea data-kind="consumable" data-i="${globalIdx}" data-field="memo">${esc(it.memo||'')}</textarea>
      <div class="photoRefs">写真: ${(it.photoRefs||[]).map(esc).join(", ")}</div>
    </div>`;
  }).join("");
  document.getElementById("consumableList").innerHTML=html || `<div class="card">該当なし</div>`;
}
function renderProducts(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const items=(state.products.items||[]).filter(it=>!q || [it.name,it.category,it.room,it.storage,it.memo].join(" ").toLowerCase().includes(q));
  document.getElementById("productList").innerHTML = `<div class="card"><b>収納物 ${items.length}件</b><p class="muted">消耗しない物・探し物対策用です。</p></div>` + items.map(it=>`
    <div class="card">
      <div class="row"><div class="itemTitle grow">${esc(it.name)}</div><span class="pill">${esc(it.category)}</span></div>
      <p><b>部屋：</b>${esc(it.room)}　<b>収納：</b>${esc(it.storage)}</p>
      <p>${esc(it.memo)}</p>
      <div class="photoRefs">写真: ${(it.photoRefs||[]).map(esc).join(", ")}</div>
    </div>`).join("");
}
function renderAdvice(){
  const sections=state.advice.sections||[];
  document.getElementById("adviceList").innerHTML = sections.map(sec=>`
    <div class="card section"><h2>${esc(sec.title)}</h2><ul>${(sec.items||[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>
  `).join("");
}
function renderAll(){ renderSummary(); renderConsumables(); renderProducts(); renderAdvice(); }
document.addEventListener("input", e=>{
  const el=e.target, kind=el.dataset.kind, i=el.dataset.i, field=el.dataset.field;
  if(kind==="consumable"){
    let v=el.value; if(field==="expectedCycleDays") v=Number(v||0);
    state.consumables.items[Number(i)][field]=v;
    renderSummary();
  } else if(el.id==="q"){ renderAll(); }
});
document.addEventListener("change", e=>{
  const el=e.target, kind=el.dataset.kind, i=el.dataset.i, field=el.dataset.field;
  if(kind==="consumable"){
    let v=el.value; if(field==="expectedCycleDays") v=Number(v||0);
    state.consumables.items[Number(i)][field]=v;
    renderSummary(); renderConsumables();
  } else if(el.id==="priorityFilter"||el.id==="dueFilter"){ renderAll(); }
});
document.querySelectorAll(".tabBtn").forEach(btn=>btn.addEventListener("click",()=>{
  document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active"); document.getElementById(btn.dataset.tab).classList.add("active");
}));
document.getElementById("exportBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(state.consumables,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="consumables.json"; a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=async(e)=>{
  const file=e.target.files[0]; if(!file) return;
  const obj=JSON.parse(await file.text());
  if(obj.items) state.consumables=obj;
  renderAll();
};
init();
</script>
</body>
</html>
